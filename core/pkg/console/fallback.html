<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Synnax Core</title>
        <style>
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #3774d0 0%, #86ace4 100%);
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            main {
                text-align: center;
                padding: 2rem;
                background: rgb(120, 120, 120);
                border-radius: 2rem;
            }
            h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
            }
            p {
                font-size: 1.25rem;
                margin-bottom: 0.5rem;
            }
            .note {
                font-size: 0.9rem;
                opacity: 0.8;
                margin-top: 2rem;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Synnax Core</h1>
            <p>Core built without embedded Console</p>
            <p class="note">
                To enable the embedded Console, rebuild with the
                <code>-tags=console</code> build flag.
            </p>
        </main>
    </body>
</html>
