[project]
name = "synnax-x"
version = "0.54.0"
description = "Shared Python utilities for Synnax"
keywords = ["Synnax"]
authors = [{ name = "Emiliano Bonilla", email = "ebonilla@synnaxlabs.com" }]
requires-python = ">=3.12,<4"
dependencies = ["numpy>=2.4.3,<3", "pandas>=3.0.1,<4", "pydantic>=2.12.5,<3"]

[project.urls]
Homepage = "https://synnaxlabs.com"
Repository = "https://github.com/synnaxlabs/synnax"

[dependency-groups]
dev = [
    "black>=26.3.1,<27",
    "isort>=8.0.1,<9",
    "mypy>=1.19.1,<2",
    "pandas-stubs>=3.0.0,<4",
    "python-dateutil>=2.9.0,<3",
    "pytest>=9.0.2,<10",
    "types-python-dateutil>=2.9.0,<3",
]

[tool.hatch.build.targets.wheel]
packages = ["x"]

[tool.isort]
profile = "black"

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "color: mark test as a color test",
    "control: mark test as a control test",
    "deprecation: mark test as a deprecation test",
    "telem: mark test as a telem test",
    "timing: mark test as a timing test",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
