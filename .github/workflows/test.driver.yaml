name: Test - Driver

on:
  pull_request:
    paths:
      - .bazeliskrc
      - .bazelrc
      - .clang-format
      - .clang-format-ignore
      - .github/workflows/test.driver.yaml
      - alamos/go/**
      - arc/cpp/**
      - aspen/**
      - cesium/**
      - client/cpp/**
      - core/**
      - driver/**
      - freighter/cpp/**
      - freighter/go/**
      - MODULE.bazel
      - MODULE.bazel.lock
      - scripts/check_clang_format.sh
      - scripts/sanitizers/**
      - vendor/**
      - x/cpp/**
      - x/go/**
  push:
    branches:
      - main
      - rc
    paths:
      - .bazeliskrc
      - .bazelrc
      - .clang-format
      - .clang-format-ignore
      - .github/workflows/test.driver.yaml
      - alamos/go/**
      - arc/cpp/**
      - aspen/**
      - cesium/**
      - client/cpp/**
      - core/**
      - driver/**
      - freighter/cpp/**
      - freighter/go/**
      - MODULE.bazel
      - MODULE.bazel.lock
      - scripts/check_clang_format.sh
      - scripts/sanitizers/**
      - vendor/**
      - x/cpp/**
      - x/go/**
  workflow_dispatch:

env:
  BAZEL_REMOTE_CACHE: ${{ vars.BAZEL_REMOTE_CACHE_URL }}

jobs:
  server:
    uses: ./.github/workflows/build.docker.yaml
    permissions:
      packages: write
    with:
      module: core
      tag: ghcr.io/synnaxlabs/synnax:${{ github.sha }}-test-driver

  test:
    name: Test
    runs-on: ubuntu-build-bot
    needs: server
    services:
      synnax:
        image: ghcr.io/synnaxlabs/synnax:${{ github.sha }}-test-driver
        env:
          SYNNAX_LISTEN: localhost:9090
          SYNNAX_VERBOSE: true
          SYNNAX_INSECURE: true
          SYNNAX_MEM: true
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 9090:9090
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      - name: Install Rust
        run: rustup update

      - name: Update Submodules
        run: git submodule update --init --recursive

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: false
          disk-cache: false
          repository-cache: false

      - name: Install Clang Format
        run: |
          sudo bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
          sudo apt-get install -y clang-format-20
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-20 100
          sudo update-alternatives --set clang-format /usr/bin/clang-format-20

      - name: Check Formatting
        run: scripts/check_clang_format.sh driver

      - name: Test Driver
        run: |
          bazel test --config=asan-leak --test_output=all //driver/... \
            --remote_cache=${{ env.BAZEL_REMOTE_CACHE }} \
            --test_env=LSAN_OPTIONS="suppressions=${{ github.workspace }}/scripts/sanitizers/lsan_suppressions.txt" \
            --spawn_strategy=local \
            --jobs=1 --test_tag_filters=-hardware
