name: Deploy - TypeScript

on:
  push:
    branches:
      - main
    paths:
      - alamos/ts/package.json
      - client/ts/package.json
      - drift/package.json
      - freighter/ts/package.json
      - pluto/package.json
      - x/media/package.json
      - x/ts/package.json
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      SYNNAX_TS_ENV: prod
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:publish-ts

      - name: Publish
        run: pnpm publish -r
