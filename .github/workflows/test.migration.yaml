name: Test - Migration

on:
  workflow_call:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true
      base_version:
        description:
          "Base version to migrate from (e.g. '0.54.0'). Defaults to latest major
          release."
        type: string
        required: false
        default: ""

  workflow_dispatch:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true
      base_version:
        description:
          "Base version to migrate from (e.g. '0.54.0'). Defaults to latest major
          release."
        type: string
        required: false
        default: ""

jobs:
  resolve:
    name: Resolve Base Version
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.resolve.outputs.base_version }}
    steps:
      - name: Resolve Base Version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.base_version }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            echo "base_version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using provided base version: $INPUT_VERSION"
            exit 0
          fi
          echo "Discovering latest major release..."
          VERSION=$(
            gh release list --repo synnaxlabs/synnax --json tagName --limit 200 \
              --jq '.[].tagName' \
            | grep -E '^synnax-v[0-9]+\.[0-9]+\.0$' \
            | sed 's/^synnax-v//' \
            | sort -V \
            | tail -n1
          )
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Could not find any major release" >&2
            exit 1
          fi
          echo "base_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved latest major release: $VERSION"

  test:
    name: "From v${{ needs.resolve.outputs.base_version }} (${{ matrix.os }})"
    needs: [resolve]
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Reference Run ID
        run: echo "Reference run ID:${{ inputs.ref_run_id }}"

      - name: Force Quit Existing Synnax Processes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: integration/scripts/KillSynnaxProcesses.cmd

      - name: Force Quit Existing Synnax Processes (Unix)
        if: runner.os == 'Linux'
        run: integration/scripts/kill_synnax_processes.sh

      - name: Download and Setup Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/DownloadArtifacts.cmd

      - name: Download and Setup Artifacts (Unix)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/download_artifacts.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: integration/pyproject.toml

      - name: Install Playwright
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Run Migration Tests
        working-directory: integration
        env:
          GH_TOKEN: ${{ github.token }}
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
        run: uv run mc --from ${{ needs.resolve.outputs.base_version }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name:
            migration-results-v${{ needs.resolve.outputs.base_version }}-${{ matrix.os
            }}
          path: integration/tests/results/*
          retention-days: 7

      - name: Upload Core Logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || cancelled() }}
        with:
          name:
            migration-core-logs-v${{ needs.resolve.outputs.base_version }}-${{ matrix.os
            }}-attempt-${{ github.run_attempt }}
          path: ~/synnax-migration-data/synnax-core.log
          retention-days: 7
