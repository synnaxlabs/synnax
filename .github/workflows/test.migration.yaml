name: Test - Migration

on:
  workflow_call:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

jobs:
  setup:
    name: Generate Migration Chains
    runs-on: ubuntu-latest
    outputs:
      MINIMUM_CHAIN: ${{ steps.chain.outputs.MINIMUM_CHAIN }}
      MAJOR_CHAIN: ${{ steps.chain.outputs.MAJOR_CHAIN }}
      PATCH_CHAIN: ${{ steps.chain.outputs.PATCH_CHAIN }}
      MINIMUM_VERSION: ${{ steps.chain.outputs.MINIMUM_VERSION }}
      MAJOR_VERSION: ${{ steps.chain.outputs.MAJOR_VERSION }}
      PATCH_VERSION: ${{ steps.chain.outputs.PATCH_VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Reference Run ID
        run: echo "Reference run ID:${{ inputs.ref_run_id }}"

      - name: Generate Migration Chains
        id: chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: integration/scripts/generate_migration_matrix.sh

  build-clients:
    name: Build Python Client Wheels
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build latest client wheels
        run: integration/scripts/build_client_wheels.sh latest wheels/latest

      - name: Build minimum version client wheels
        run:
          integration/scripts/build_client_wheels.sh ${{
          needs.setup.outputs.MINIMUM_VERSION }} wheels/${{
          needs.setup.outputs.MINIMUM_VERSION }}

      - name: Build major version client wheels
        if: needs.setup.outputs.MAJOR_VERSION != needs.setup.outputs.MINIMUM_VERSION
        run:
          integration/scripts/build_client_wheels.sh ${{
          needs.setup.outputs.MAJOR_VERSION }} wheels/${{
          needs.setup.outputs.MAJOR_VERSION }}

      - name: Build patch version client wheels
        if: >-
          needs.setup.outputs.PATCH_VERSION != needs.setup.outputs.MINIMUM_VERSION &&
          needs.setup.outputs.PATCH_VERSION != needs.setup.outputs.MAJOR_VERSION
        run:
          integration/scripts/build_client_wheels.sh ${{
          needs.setup.outputs.PATCH_VERSION }} wheels/${{
          needs.setup.outputs.PATCH_VERSION }}

      - name: Upload client wheels
        uses: actions/upload-artifact@v7
        with:
          name: synnax-client-wheels
          path: wheels/
          retention-days: 7

  test:
    name: "From ${{ matrix.version }} (${{ matrix.os }})"
    needs: [setup, build-clients]
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # chain_name: [minimum, major, patch]  # Disabled minimum while latest major == minimum
        chain_name: [major, patch]
        include:
          - chain_name: minimum
            chain: ${{ needs.setup.outputs.MINIMUM_CHAIN }}
            version: ${{ needs.setup.outputs.MINIMUM_VERSION }}
          - chain_name: major
            chain: ${{ needs.setup.outputs.MAJOR_CHAIN }}
            version: ${{ needs.setup.outputs.MAJOR_VERSION }}
          - chain_name: patch
            chain: ${{ needs.setup.outputs.PATCH_CHAIN }}
            version: ${{ needs.setup.outputs.PATCH_VERSION }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Force Quit Existing Synnax Processes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: integration/scripts/KillSynnaxProcessesWindows.cmd

      - name: Force Quit Existing Synnax Processes (Unix)
        if: runner.os == 'Linux'
        run: integration/scripts/kill_synnax_processes_unix.sh

      - name: Download and Setup Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/DownloadArtifactsWindows.cmd

      - name: Download and Setup Artifacts (Unix)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/download_artifacts_unix.sh

      - name: Download Client Wheels
        uses: actions/download-artifact@v7
        with:
          name: synnax-client-wheels
          path: ~/synnax-wheels

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: integration/pyproject.toml

      - name: Install Playwright (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Install Playwright (Unix)
        if: runner.os == 'Linux'
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Migration Test
        working-directory: integration
        env:
          GH_TOKEN: ${{ github.token }}
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
        run: uv run migration-orchestrator --chain "${{ matrix.chain }}"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: migration-results-${{ matrix.chain_name }}-${{ matrix.os }}
          path: integration/tests/results/*
          retention-days: 7

      - name: Upload Core Logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || cancelled() }}
        with:
          name:
            migration-core-logs-${{ matrix.chain_name }}-${{ matrix.os }}-attempt-${{
            github.run_attempt }}
          path: ~/synnax-data/synnax-core.log
          retention-days: 7
