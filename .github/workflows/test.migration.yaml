name: Test - Migration

on:
  workflow_call:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true
      append_latest:
        description: "Auto-append 'latest' (current build) to the chain"
        type: boolean
        default: true
      chain:
        description: "Custom version chain (e.g. '0.52.0, 0.53.1')"
        type: string
        default: ""

jobs:
  setup:
    name: Generate Migration Chains
    runs-on: ubuntu-latest
    outputs:
      MATRIX: ${{ steps.chain.outputs.MATRIX }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Reference Run ID
        run: echo "Reference run ID:${{ inputs.ref_run_id }}"

      - name: Generate Migration Chains
        id: chain
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_CHAIN: ${{ inputs.chain }}
          APPEND_LATEST: ${{ inputs.append_latest }}
        run: integration/scripts/generate_migration_matrix.sh

  test:
    name: "From ${{ matrix.version }} (${{ matrix.os }})"
    needs: [setup]
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.MATRIX) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Force Quit Existing Synnax Processes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: integration/scripts/KillSynnaxProcesses.cmd

      - name: Force Quit Existing Synnax Processes (Unix)
        if: runner.os == 'Linux'
        run: integration/scripts/kill_synnax_processes.sh

      - name: Download and Setup Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/DownloadArtifacts.cmd

      - name: Download and Setup Artifacts (Unix)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/download_artifacts.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: integration/pyproject.toml

      - name: Run Setup Chain
        env:
          GH_TOKEN: ${{ github.token }}
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
        run: integration/scripts/run_migration_chain.sh --chain "${{ matrix.chain }}"

      - name: Start Latest Core
        shell: bash
        env:
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
        run: |
          mkdir -p ~/synnax-data
          ~/synnax-binaries/synnax start -i > ~/synnax-data/synnax-core.log 2>&1 &
          for i in $(seq 1 30); do
            nc -z localhost 9090 2>/dev/null && break
            sleep 1
          done

      - name: Install Playwright
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Run Migration Verify
        working-directory: integration
        env:
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
        run: uv run tc migration

      - name: Stop Core
        if: always()
        shell: bash
        run: kill $(lsof -ti:9090) 2>/dev/null || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: migration-results-${{ matrix.chain_name }}-${{ matrix.os }}
          path: integration/tests/results/*
          retention-days: 7

      - name: Upload Core Logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || cancelled() }}
        with:
          name:
            migration-core-logs-${{ matrix.chain_name }}-${{ matrix.os }}-attempt-${{
            github.run_attempt }}
          path: ~/synnax-data/synnax-core.log
          retention-days: 7
