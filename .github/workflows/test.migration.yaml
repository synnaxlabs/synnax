name: Test - Migration

on:
  workflow_call:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

jobs:
  setup:
    name: Generate Migration Chain
    runs-on: ubuntu-latest
    outputs:
      CHAIN: ${{ steps.chain.outputs.MIGRATION_CHAIN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Reference Run ID
        run: echo "Reference run ID:${{ inputs.ref_run_id }}"

      - name: Generate Migration Chain
        id: chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: integration/scripts/generate_migration_matrix.sh

  test:
    name: Migration (${{ matrix.os }})
    needs: setup
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Force Quit Existing Synnax Processes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: integration/scripts/KillSynnaxProcessesWindows.cmd

      - name: Force Quit Existing Synnax Processes (Unix)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: integration/scripts/kill_synnax_processes_unix.sh

      - name: Download and Setup Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/DownloadArtifactsWindows.cmd

      - name: Download and Setup Artifacts (Unix)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/download_artifacts_unix.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: integration/pyproject.toml

      - name: Install Playwright (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Install Playwright (Unix)
        if: runner.os == 'Linux'
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Run Migration Test
        working-directory: integration
        env:
          GH_TOKEN: ${{ github.token }}
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: >-
          uv run migration-orchestrator --chain "${{ needs.setup.outputs.CHAIN }}"
          --test-type inplace

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: migration-results-${{ matrix.os }}
          path: integration/tests/results/*
          retention-days: 7

      - name: Upload Core Logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || cancelled() }}
        with:
          name: migration-core-logs-${{ matrix.os }}-attempt-${{ github.run_attempt }}
          path: ~/synnax-data/synnax-core.log
          retention-days: 7
