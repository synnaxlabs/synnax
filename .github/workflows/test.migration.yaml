name: Test - Migration

on:
  workflow_call:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ref_run_id:
        description: "Reference run ID for downloading build artifacts"
        type: string
        required: true
      chain:
        description: "Custom version chain (e.g. '0.52.0, 0.53.1, 0.54.2')"
        type: string
        default: ""

jobs:
  setup:
    name: Generate Migration Chains
    runs-on: ubuntu-latest
    outputs:
      MATRIX: ${{ steps.chain.outputs.MATRIX }}
      VERSIONS: ${{ steps.chain.outputs.VERSIONS }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Reference Run ID
        run: echo "Reference run ID:${{ inputs.ref_run_id }}"

      - name: Generate Migration Chains
        id: chain
        env:
          GH_TOKEN: ${{ github.token }}
          CUSTOM_CHAIN: ${{ inputs.chain }}
        run: integration/scripts/generate_migration_matrix.sh

  build-clients:
    name: Build Python Client Wheels
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build client wheels
        run: |
          IFS=',' read -ra VERSIONS <<< "${{ needs.setup.outputs.VERSIONS }}"
          for version in "${VERSIONS[@]}"; do
            echo "Building wheels for $version..."
            integration/scripts/build_client_wheels.sh "$version" "wheels/$version"
          done

      - name: Upload client wheels
        uses: actions/upload-artifact@v7
        with:
          name: synnax-client-wheels
          path: wheels/
          retention-days: 7

  test:
    name: "From ${{ matrix.version }} (${{ matrix.os }})"
    needs: [setup, build-clients]
    timeout-minutes: 60
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.MATRIX) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Force Quit Existing Synnax Processes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: integration/scripts/KillSynnaxProcessesWindows.cmd

      - name: Force Quit Existing Synnax Processes (Unix)
        if: runner.os == 'Linux'
        run: integration/scripts/kill_synnax_processes_unix.sh

      - name: Download and Setup Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/DownloadArtifactsWindows.cmd

      - name: Download and Setup Artifacts (Unix)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
          REF_RUN_ID: ${{ inputs.ref_run_id }}
        run: integration/scripts/download_artifacts_unix.sh

      - name: Download Client Wheels
        uses: actions/download-artifact@v7
        with:
          name: synnax-client-wheels
          path: ~/synnax-wheels

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: integration/pyproject.toml

      - name: Install Playwright
        working-directory: integration
        run: uv run playwright install --with-deps

      - name: Migration Test
        working-directory: integration
        env:
          GH_TOKEN: ${{ github.token }}
          SYNNAX_LICENSE_KEY: ${{ secrets.SYNNAX_LICENSE_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
        run: uv run migration-conductor --chain "${{ matrix.chain }}"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: migration-results-${{ matrix.chain_name }}-${{ matrix.os }}
          path: integration/tests/results/*
          retention-days: 7

      - name: Upload Core Logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || cancelled() }}
        with:
          name:
            migration-core-logs-${{ matrix.chain_name }}-${{ matrix.os }}-attempt-${{
            github.run_attempt }}
          path: ~/synnax-data/synnax-core.log
          retention-days: 7
