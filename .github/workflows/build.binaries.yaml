name: Build - Binaries

run-name:
  ${{ github.event.inputs.RUN_NAME || format('Build Binaries - {0}', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      windows:
        description: "OS: Windows"
        type: boolean
        default: false
      macos:
        description: "OS: macOS"
        type: boolean
        default: false
      ubuntu:
        description: "OS: Ubuntu"
        type: boolean
        default: false
      ubuntu_22_04:
        description: "OS: NI Linux RT (Ubuntu 22.04)"
        type: boolean
        default: false
      driver:
        description: "Build: Driver"
        type: boolean
        default: false
      console:
        description: "Build: Console"
        type: boolean
        default: false
      core:
        description: "Build: Core"
        type: boolean
        default: false
      RUN_NAME:
        description: "Custom name for run"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_SCOPE: deploy-synnax

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Get Version
        id: version
        working-directory: core
        run: |
          BASE_VERSION=$(cat pkg/version/VERSION)
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            echo "VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF}" == "refs/heads/rc" ]; then
            echo "VERSION=${BASE_VERSION}-rc" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            echo "VERSION=${BASE_VERSION}-${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Generate OS Matrix
        id: set-matrix
        run: |
          MATRIX=$(scripts/generate_os_matrix.sh "${{ inputs.windows }}" "${{ inputs.macos }}" "${{ inputs.ubuntu }}" "${{ inputs.ubuntu_22_04 }}")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Verify Build Configuration
        run: |
          scripts/verify_build_config.sh \
            "${{ steps.version.outputs.VERSION }}" \
            "${{ inputs.windows }}" \
            "${{ inputs.macos }}" \
            "${{ inputs.ubuntu }}" \
            "${{ inputs.ubuntu_22_04 }}" \
            "${{ inputs.driver }}" \
            "${{ inputs.console }}" \
            "${{ inputs.core }}"

  build:
    name: Build (${{ matrix.os }})
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    timeout-minutes: 75
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Update Submodules
        run: git submodule update --init --recursive

      - name: Install Deps On Ubuntu
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev autoconf automake libtool

      - name: Install NI-DAQmx (Ubuntu)
        if: inputs.driver && (matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-22.04')
        run: |
          # Download and install NI repository registration package for Ubuntu 22.04
          wget http://download.ni.com/ni-linux-desktop/2024/Q4/ni-ubuntu2204-drivers-2024Q4.deb
          sudo apt-get install -y ./ni-ubuntu2204-drivers-2024Q4.deb
          # Update package list
          sudo apt-get update
          # Install NI-DAQmx
          sudo apt-get install -y ni-daqmx
          # Run DKMS to build kernel modules
          sudo dkms autoinstall

      - name: Install NI-DAQmx (Windows)
        if: inputs.driver && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Download NI Package Manager 24.3.0
          $nipmUrl = "https://download.ni.com/support/nipkg/products/ni-package-manager/installers/NIPackageManager24.3.0.exe"
          Invoke-WebRequest -Uri $nipmUrl -OutFile "NIPackageManager.exe"

          # Install NI Package Manager silently
          Start-Process -FilePath ".\NIPackageManager.exe" -ArgumentList "/S /v`"/qn --passive --accept-eulas --prevent-reboot --quiet`"" -Wait

          # Add NI-DAQmx feed (using 2024 Q4 release)
          & "C:\Program Files\National Instruments\NI Package Manager\nipkg.exe" feed-add "https://download.ni.com/support/nipkg/products/ni-d/ni-daqmx/24.5/released"

          # Update feeds
          & "C:\Program Files\National Instruments\NI Package Manager\nipkg.exe" feed-update

          # Install NI-DAQmx
          & "C:\Program Files\National Instruments\NI Package Manager\nipkg.exe" install ni-daqmx --accept-eulas --yes

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ env.CACHE_SCOPE }}-${{ matrix.os }}
          repository-cache: true

      - name: Build Driver
        if: inputs.driver && matrix.os != 'windows-latest'
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            # NI Linux RT build (without DAQmx capability querying)
            TMPDIR=/tmp bazel build --enable_platform_specific_config -c opt --define=platform=nilinuxrt --announce_rc --verbose_failures //driver
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            # Linux build with NI-DAQmx capability querying
            bazel build --enable_platform_specific_config -c opt --config=hide_symbols --config=ni-daqmx --announce_rc --verbose_failures //driver
          else
            # macOS build (without DAQmx - not available on macOS)
            bazel build --enable_platform_specific_config -c opt --config=hide_symbols --announce_rc --verbose_failures //driver
          fi

      - name: Build Driver (Windows)
        if: inputs.driver && matrix.os == 'windows-latest'
        run:
          bazel --output_user_root=C:/tmp build --enable_platform_specific_config -c opt
          --config=ni-daqmx --announce_rc //driver

      - name: Rename Driver Binary
        if: inputs.driver
        shell: bash
        run: |
          mv bazel-bin/driver/driver${{ matrix.executable }} bazel-bin/driver/synnax-driver-v${{ needs.setup.outputs.VERSION }}${{ matrix.executable }}

      - name: Upload Driver Binary as Artifact
        if: inputs.driver
        uses: actions/upload-artifact@v4
        with:
          name:
            synnax-driver-v${{ needs.setup.outputs.VERSION }}-${{ matrix.binary-suffix
            }}
          path:
            bazel-bin/driver/synnax-driver-v${{ needs.setup.outputs.VERSION }}${{
            matrix.executable }}
          retention-days: 7
          if-no-files-found: error

      - name: Copy Driver to Assets
        if: inputs.driver && inputs.core
        shell: bash
        run: |
          cp bazel-bin/driver/synnax-driver-v${{ needs.setup.outputs.VERSION }}${{ matrix.executable }} core/pkg/service/hardware/embedded/assets/driver${{ matrix.executable }}

      - name: Set up Go
        if: inputs.core
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: go.work.sum

      - name: Set up pnpm
        if: inputs.console
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: inputs.console
        uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install Node Dependencies
        if: inputs.console
        run: pnpm install

      - name: Build Console Web Assets
        if: inputs.console
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: pnpm build:console-vite

      - name: Upload Console Assets as Artifact
        if: inputs.console
        uses: actions/upload-artifact@v4
        with:
          name:
            synnax-console-v${{ needs.setup.outputs.VERSION }}-${{ matrix.binary-suffix
            }}
          path: console/dist/
          retention-days: 7
          if-no-files-found: error

      - name: Move Console to Assets
        if: inputs.console && inputs.core
        shell: bash
        run: cp -r console/dist/* core/pkg/service/console/dist/

      - name: Build Core
        if: inputs.core
        working-directory: core
        shell: bash
        run: |
          TAGS=""
          ${{ inputs.console == true }} && TAGS="console"
          ${{ inputs.driver == true }} && TAGS="${TAGS:+$TAGS,}driver"
          [ -n "$TAGS" ] && TAGS="-tags $TAGS"
          go build $TAGS -o synnax-v${{ needs.setup.outputs.VERSION }}${{ matrix.executable }}

      - name: Upload Core Binary as Artifact
        if: inputs.core
        uses: actions/upload-artifact@v4
        with:
          name: synnax-v${{ needs.setup.outputs.VERSION }}-${{ matrix.binary-suffix }}
          path: core/synnax-v${{ needs.setup.outputs.VERSION }}${{ matrix.executable }}
          retention-days: 7
          if-no-files-found: error

      - name: Debug Build Environment
        if: failure() && matrix.os != 'windows-latest'
        run: integration/scripts/debug_build_environment_unix.sh

      - name: Debug Build Environment (Windows)
        if: failure() && matrix.os == 'windows-latest'
        shell: cmd
        run: integration/scripts/DebugBuildEnvironmentWindows.cmd
