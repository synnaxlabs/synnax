name: Test - Integration

run-name:
  ${{ github.event.inputs.RUN_NAME || format('Test - Integration {0}', github.ref_name)
  }}

on:
  pull_request:
    branches:
      - main
      - rc
    paths:
      - .bazeliskrc
      - .bazelrc
      - .github/workflows/build.synnax.yaml
      - .github/workflows/test.integration.yaml
      - .github/workflows/test.integration.worker.yaml
      - alamos/go/**
      - alamos/py/**
      - alamos/ts/**
      - aspen/**
      - cesium/**
      - client/**
      - configs/ts/**
      - configs/vite/**
      - console/**
      - core/**
      - drift/**
      - driver/**
      - freighter/cpp/**
      - freighter/go/**
      - freighter/ts/**
      - freighter/py/**
      - go.work
      - go.work.sum
      - integration/**
      - MODULE.bazel
      - MODULE.bazel.lock
      - package.json
      - pluto/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - pyproject.toml
      - turbo.json
      - uv.lock
      - uv.toml
      - vendor/**
      - x/cpp/**
      - x/go/**
      - x/media/**
      - x/ts/**

  workflow_dispatch:
    inputs:
      RUN_NAME:
        description: "Custom name for this workflow run"
        required: false
        default: ""
        type: string
      SKIP_BUILD:
        description: "Skip build process and use artifacts from another run"
        required: false
        default: false
        type: boolean
      REF_RUN_ID:
        description:
          "Reference run ID for artifacts (when SKIP_BUILD is true, blank for most
          recent)"
        required: false
        default: ""
        type: string
      FLAGS:
        description: "Additional flags to pass to test-conductor (e.g., 'console/...')"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      SKIP_BUILD:
        ${{ steps.update-outputs.outputs.SKIP_BUILD ||
        steps.set-outputs.outputs.SKIP_BUILD }}
      REF_RUN_ID:
        ${{ steps.update-outputs.outputs.REF_RUN_ID ||
        steps.set-outputs.outputs.REF_RUN_ID }}
      FLAGS: ${{ steps.set-outputs.outputs.FLAGS }}
      TEST_MATRIX:
        ${{ steps.set-outputs.outputs.CUSTOM_MATRIX ||
        steps.test-matrix.outputs.TEST_MATRIX }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Get Version
        id: version
        working-directory: core
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            echo "VERSION=$(cat pkg/version/VERSION)" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF}" == "refs/heads/rc" ]; then
            echo "VERSION=$(cat pkg/version/VERSION)-rc" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(cat pkg/version/VERSION)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Set outputs
        id: set-outputs
        env:
          SKIP_BUILD: ${{ github.event.inputs.SKIP_BUILD || 'false' }}
          REF_RUN_ID: ${{ github.event.inputs.REF_RUN_ID || '' }}
          FLAGS: ${{ github.event.inputs.FLAGS || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "FLAGS=${FLAGS}" >> $GITHUB_OUTPUT
          echo "SKIP_BUILD=${SKIP_BUILD}" >> $GITHUB_OUTPUT
          if [ -n "${FLAGS}" ]; then
            SAFE_NAME=$(echo "${FLAGS}" | sed 's/[^a-zA-Z0-9_-]/_/g')
            echo "CUSTOM_MATRIX={\"include\":[{\"name\":\"${SAFE_NAME}\",\"target\":\"\"}]}" >> $GITHUB_OUTPUT
          fi
          if [ "${SKIP_BUILD}" = "true" ]; then
            if [ -z "${REF_RUN_ID}" ]; then
              echo "Empty REF_RUN_ID. Setting SKIP_BUILD to false."
              echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
            else
              echo "REF_RUN_ID=${REF_RUN_ID}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check for Cached Artifacts
        if: ${{ steps.set-outputs.outputs.SKIP_BUILD == 'false' }}
        id: check-cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: integration/scripts/check_artifact_cache.sh all

      - name: Update Outputs Based on Cache
        if: ${{ steps.set-outputs.outputs.SKIP_BUILD == 'false' }}
        id: update-outputs
        run: |
          if [ "${{ steps.check-cache.outputs.CACHE_HIT }}" = "true" ]; then
            echo "Using cached artifacts from run ${{ steps.check-cache.outputs.CACHED_RUN_ID }}"
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
            echo "REF_RUN_ID=${{ steps.check-cache.outputs.CACHED_RUN_ID }}" >> $GITHUB_OUTPUT
          else
            echo "Using this runs artifacts - ${{ github.run_id }}"
            echo "REF_RUN_ID=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate Test Coverage
        if: ${{ steps.set-outputs.outputs.FLAGS == '' }}
        id: test-matrix
        run: integration/scripts/validate_test_coverage.sh

  build:
    needs: setup
    if: needs.setup.outputs.SKIP_BUILD == 'false'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/build.synnax.yaml
    with:
      windows: true
      ubuntu: true
      docker: false
      driver: true
      console: true
      core: true
      use_simple_artifact_names: true
      version: ${{ needs.setup.outputs.VERSION }}
    secrets: inherit

  test-windows:
    name: Test (windows)
    needs: [setup, build]
    if:
      ${{ !cancelled() && needs.setup.result == 'success' && (needs.build.result ==
      'success' || needs.build.result == 'skipped') }}
    uses: ./.github/workflows/test.integration.worker.yaml
    with:
      test_matrix: ${{ needs.setup.outputs.TEST_MATRIX }}
      ref_run_id: ${{ needs.setup.outputs.REF_RUN_ID }}
      os: windows-latest
      flags: ${{ needs.setup.outputs.FLAGS }}
    secrets: inherit

  test-ubuntu:
    name: Test (ubuntu)
    needs: [setup, build]
    if:
      ${{ !cancelled() && needs.setup.result == 'success' && (needs.build.result ==
      'success' || needs.build.result == 'skipped') }}
    uses: ./.github/workflows/test.integration.worker.yaml
    with:
      test_matrix: ${{ needs.setup.outputs.TEST_MATRIX }}
      ref_run_id: ${{ needs.setup.outputs.REF_RUN_ID }}
      os: ubuntu-latest
      flags: ${{ needs.setup.outputs.FLAGS }}
    secrets: inherit

  migration:
    name: Migration
    needs: [setup, build]
    if:
      ${{ !cancelled() && needs.setup.result == 'success' && (needs.build.result ==
      'success' || needs.build.result == 'skipped') && github.base_ref == 'main' }}
    uses: ./.github/workflows/test.migration.yaml
    with:
      ref_run_id: ${{ needs.setup.outputs.REF_RUN_ID }}
    secrets: inherit
