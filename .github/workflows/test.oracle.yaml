name: Test - Oracle

on:
  pull_request:
    paths:
      - .custom-gcl.yml
      - .github/workflows/test.oracle.yaml
      - .github/workflows/test.go.yaml
      - .golangci.yaml
      - alamos/go/**
      - codecov.yaml
      - freighter/go/**
      - oracle/**
      - scripts/check_gofmt.sh
      - x/go/**
  push:
    branches:
      - main
      - rc
    paths:
      - .custom-gcl.yml
      - .github/workflows/test.oracle.yaml
      - .github/workflows/test.go.yaml
      - .golangci.yaml
      - alamos/go/**
      - codecov.yaml
      - freighter/go/**
      - oracle/**
      - scripts/check_gofmt.sh
      - x/go/**
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.go.yaml
    secrets: inherit
    with:
      directory: oracle
      ginkgo_flags: -p --randomize-all --fail-on-empty --race
      coverage_flag: oracle
