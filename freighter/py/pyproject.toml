[project]
name = "synnax-freighter"
version = "0.54.0"
authors = [{ name = "Emiliano Bonilla", email = "ebonilla@synnaxlabs.com" }]
requires-python = ">=3.12,<4"
dependencies = [
    "alamos",
    "msgpack>=1.1.2,<2",
    "synnax-x",
    "pydantic>=2.12.5,<3",
    "urllib3>=2.6.3,<3",
    "websockets>=16.0,<17",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1,<2",
    "ruff>=0.12.4,<1",
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.0.0,<8",
]

[tool.hatch.build.targets.wheel]
packages = ["freighter"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["freighter", "alamos"]

[tool.mypy]
mypy_path = "stubs"
plugins = ["pydantic.mypy"]
strict = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_types = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
markers = [
    "http: mark test as an http test",
    "sync: mark test as a sync test",
    "ws: mark test as a websocket test",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
