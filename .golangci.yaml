version: "2"
linters:
  enable:
    - exptostd
    - modernize
    - perfsprint
    - protogetter
    - revive
    - usestdlibvars
    - unconvert
    - unparam
    - mustsucceedlint
    - setlint
  settings:
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    ineffassign:
      check-escaping-errors: true
    perfsprint:
      err-error: true
    revive:
      rules:
        - name: error-naming
        - name: var-declaration
        - name: var-naming
          arguments:
            - []
            - []
            - - skip-package-name-checks: true
    unconvert:
      fast-math: true
    usestdlibvars:
      time-date-month: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
    custom:
      mustsucceedlint:
        type: "module"
        description: >
          Detects Expect(err).ToNot(HaveOccurred()) patterns that can be replaced with
          MustSucceed.
      setlint:
        type: "module"
        description: >
          Detects map[T]struct{} and map[T]bool patterns that should use set.Set[T].

run:
  build-tags:
    - console
    - driver
