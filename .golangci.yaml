version: "2"
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - swaggo
  settings:
    gci:
      no-inline-comments: true
      no-prefix-comments: true
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
        - pattern: "a[b:len(a)]"
          replacement: "a[b:]"
        - pattern: "a[0:b]"
          replacement: "a[:b]"
    gofumpt:
      extra-rules: true
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dogsled
    - durationcheck
    - err113
    - errorlint
    - exptostd
    - gocheckcompilerdirectives
    - godot
    - goprintffuncname
    - iotamixing
    - mirror
    - misspell
    - modernize
    - nilnesserr
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - promlinter
    - protogetter
    - reassign
    - revive
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - usestdlibvars
  settings:
    govet:
      enable-all: true
      disable:
        - shadow
    ineffassign:
      check-escaping-errors: true
    misspell:
      locale: US
    revive:
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: confusing-results
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: deep-exit
          disabled: true
        - name: dot-imports
          arguments:
            - allowed-packages:
                [
                  "github.com/onsi/ginkgo/v2",
                  "github.com/onsi/gomega",
                  "github.com/synnaxlabs/arc/compiler/testutil",
                  "github.com/synnaxlabs/cesium/internal/testutil",
                  "github.com/synnaxlabs/x/testutil",
                ]
        - name: empty-block
          disabled: true
        - name: enforce-switch-style
          arguments: ["allowNoDefault"]
        - name: error-return
          disabled: true
        - name: exported
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          arguments:
            - 4
        - name: import-shadowing
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-control-nesting
          arguments:
            - 6
        - name: max-public-structs
          disabled: true
        - name: modifies-value-receiver
          disabled: true
        - name: nested-structs
          disabled: true
        - name: package-comments
          disabled: true
        - name: redefines-builtin-id
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
        - name: var-naming
          arguments:
            - - "ID"
            - []
            - - skip-package-name-checks: true
                skip-package-name-collision-with-go-std: true

    staticcheck:
      checks:
        - all
        - -ST1000

    unused:
      field-writes-are-uses: false
      local-variables-are-used: false
      generated-is-used: false
    usestdlibvars:
      time-date-month: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
run:
  build-tags:
    - console
    - driver
