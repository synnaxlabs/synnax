version: "2"
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - swaggo
  settings:
    gci:
      no-inline-comments: true
      no-prefix-comments: true
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
        - pattern: "a[b:len(a)]"
          replacement: "a[b:]"
        - pattern: "a[0:b]"
          replacement: "a[:b]"
    gofumpt:
      extra-rules: true
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dogsled
    - durationcheck
    - err113
    - errorlint
    - exptostd
    - gocheckcompilerdirectives
    - godot
    - goprintffuncname
    - misspell
    - modernize
    - nilnesserr
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - promlinter
    - protogetter
    - reassign
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
  settings:
    unused:
      field-writes-are-uses: false
      local-variables-are-used: false
      generated-is-used: false
